<!DOCTYPE html>
<html>
<head>
    <title>API Test</title>
</head>
<body>
    <h1>API Test</h1>
    <div id="result"></div>
    
    <script>
        // Test the API endpoints
        async function testAPI() {
            const resultDiv = document.getElementById('result');
            
            try {
                // Test health endpoint
                const healthResponse = await fetch('http://localhost:5000/api/notes/health');
                const healthData = await healthResponse.json();
                resultDiv.innerHTML += '<p>Health Check: ' + JSON.stringify(healthData) + '</p>';
                
                // Test notes endpoint (should fail without auth)
                const notesResponse = await fetch('http://localhost:5000/api/notes');
                const notesData = await notesResponse.json();
                resultDiv.innerHTML += '<p>Notes (no auth): ' + JSON.stringify(notesData) + '</p>';
                
            } catch (error) {
                resultDiv.innerHTML += '<p>Error: ' + error.message + '</p>';
            }
        }
        
        testAPI();
    </script>
</body>
</html>
